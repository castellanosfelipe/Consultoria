name: Publicar en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Construir y subir artefacto Astro
        uses: withastro/action@e84f40bd8d2caa9e768ec82ad30dd81f0b280853 # v6
        with:
          node-version: 24
        env:
          REQUIRE_PRODUCTION_CONFIG: "true"
          PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io
          PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          PUBLIC_CAL_URL: ${{ vars.PUBLIC_CAL_URL }}
          PUBLIC_LINKEDIN_URL: ${{ vars.PUBLIC_LINKEDIN_URL }}
          PUBLIC_PLAUSIBLE_DOMAIN: ${{ vars.PUBLIC_PLAUSIBLE_DOMAIN }}
          PUBLIC_PLAUSIBLE_SRC: ${{ vars.PUBLIC_PLAUSIBLE_SRC }}
          PUBLIC_PORTRAIT_PATH: ${{ vars.PUBLIC_PORTRAIT_PATH }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar artefacto
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
