name: Calidad

on:
  push: {}
  pull_request:

permissions:
  contents: read

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run audit:prod
      - run: npm run check
      - run: npm run build
        env:
          REQUIRE_PRODUCTION_CONFIG: "true"
          PUBLIC_SITE_URL: https://consultoria-felipe-qa.netlify.app
          PUBLIC_CAL_URL: https://cal.com/castellanosfelipe/consulta
          PUBLIC_LINKEDIN_URL: https://www.linkedin.com/in/castellanosfelipe/
          PUBLIC_PLAUSIBLE_DOMAIN: consultoria-felipe-qa.netlify.app
      - name: Instalar navegador para E2E
        run: npx playwright install --with-deps chromium
      - name: E2E (entrada por ancla + axe)
        run: npm run test:e2e
        env:
          PUBLIC_BASE_PATH: /
      - run: npm run lighthouse
      - name: Guardar reportes Lighthouse
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: lighthouse-${{ github.sha }}
          path: .lighthouseci/reports/
          retention-days: 14
