name: Calidad

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
        env:
          PUBLIC_SITE_URL: https://example.com
      - run: npm run lighthouse
      - name: Guardar reportes Lighthouse
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-${{ github.sha }}
          path: .lighthouseci/reports/
          retention-days: 14
